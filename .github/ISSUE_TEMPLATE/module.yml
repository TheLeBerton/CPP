    id: objective
    attributes:
      label: Objective
      placeholder: "What this module introduces"
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      placeholder: "Authorized / forbidden by this module"
    validations:
      required: false

